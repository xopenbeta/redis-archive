name: Build and Release Redis

on:
  push:
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      build_all:
        description: '构建所有版本（如选择否则只构建最新版本）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Build Matrix
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.set-matrix.outputs.versions }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up matrix
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.build_all }}" = "true" ]; then
              # 构建所有版本
              VERSIONS=$(jq -c '.versions' versions.json)
            else
              # 只构建第一个版本（最新版本）
              VERSIONS=$(jq -c '.versions[0:1]' versions.json)
            fi
          else
            # tag 触发时，构建所有版本
            VERSIONS=$(jq -c '.versions' versions.json)
          fi
          
          echo "versions=${VERSIONS}" >> $GITHUB_OUTPUT
          
          # 生成完整的 matrix（版本 × 平台）
          # 使用 -c 参数将 JSON 压缩成一行，避免多行输出问题
          MATRIX=$(jq -n -c --argjson versions "${VERSIONS}" '{
            include: [
              ($versions[] | {
                version: .,
                runner: "ubuntu-latest",
                os: "linux",
                arch: "x86_64",
                target: "linux-x86_64"
              }),
              ($versions[] | {
                version: .,
                runner: "ubuntu-latest",
                os: "linux",
                arch: "arm64",
                target: "linux-arm64"
              }),
              ($versions[] | {
                version: .,
                runner: "macos-13",
                os: "macos",
                arch: "x86_64",
                target: "macos-x86_64"
              }),
              ($versions[] | {
                version: .,
                runner: "macos-latest",
                os: "macos",
                arch: "arm64",
                target: "macos-arm64"
              }),
              ($versions[] | {
                version: .,
                runner: "windows-latest",
                os: "windows",
                arch: "x86_64",
                target: "windows-x86_64"
              })
            ]
          }')
          
          echo "matrix=${MATRIX}" >> $GITHUB_OUTPUT

  build:
    name: Build Redis ${{ matrix.version }} for ${{ matrix.target }}
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================== Linux 构建 ====================
      - name: Setup build tools (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          fi

      - name: Build Redis (Linux x86_64)
        if: matrix.target == 'linux-x86_64'
        run: |
          VERSION="${{ matrix.version }}"
          wget "https://github.com/redis/redis/archive/refs/tags/${VERSION}.tar.gz"
          tar xzf "${VERSION}.tar.gz"
          cd "redis-${VERSION}/src"
          make -j$(nproc)
          mkdir -p "${{ github.workspace }}/builds"
          cp redis-server redis-cli redis-benchmark "${{ github.workspace }}/builds/"

      - name: Build Redis (Linux ARM64)
        if: matrix.target == 'linux-arm64'
        run: |
          VERSION="${{ matrix.version }}"
          wget "https://github.com/redis/redis/archive/refs/tags/${VERSION}.tar.gz"
          tar xzf "${VERSION}.tar.gz"
          cd "redis-${VERSION}/src"
          make CC=aarch64-linux-gnu-gcc -j$(nproc)
          mkdir -p "${{ github.workspace }}/builds"
          cp redis-server redis-cli redis-benchmark "${{ github.workspace }}/builds/"

      # ==================== macOS 构建 ====================
      - name: Build Redis (macOS)
        if: matrix.os == 'macos'
        run: |
          VERSION="${{ matrix.version }}"
          wget "https://github.com/redis/redis/archive/refs/tags/${VERSION}.tar.gz"
          tar xzf "${VERSION}.tar.gz"
          cd "redis-${VERSION}/src"
          
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            make CFLAGS="-arch arm64" LDFLAGS="-arch arm64" -j$(sysctl -n hw.ncpu)
          else
            make CFLAGS="-arch x86_64" LDFLAGS="-arch x86_64" -j$(sysctl -n hw.ncpu)
          fi
          
          mkdir -p "${{ github.workspace }}/builds"
          cp redis-server redis-cli redis-benchmark "${{ github.workspace }}/builds/"

      # ==================== Windows 构建 ====================
      # tporadowski/redis 仅维护到 v5.x，6.x/7.x/8.x 需从源码编译
      # 使用 MSYS2（MSYS 子系统）提供 POSIX 层，直接编译 Redis 源码
      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MSYS
          update: false
          install: >-
            gcc
            make
            base-devel

      - name: Build Redis (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        run: |
          set -e
          VERSION="${{ matrix.version }}"
          BUILDS_DIR="$(cygpath -u '${{ github.workspace }}')/builds"

          echo "下载 Redis ${VERSION} 源码..."
          curl -fL "https://github.com/redis/redis/archive/refs/tags/${VERSION}.tar.gz" -o redis.tar.gz
          tar xzf redis.tar.gz
          cd "redis-${VERSION}/src"

          echo "修复 MSYS2 环境下 debug.c 缺少 dlfcn.h 的问题（Dl_info/dladdr）..."
          sed -i '1s/^/#include <dlfcn.h>\n/' "redis-${VERSION}/src/debug.c"

          echo "使用 MSYS2 编译 Redis（MALLOC=libc 避免 jemalloc 兼容问题）..."
          make MALLOC=libc -j$(nproc)

          mkdir -p "$BUILDS_DIR"

          # 复制可执行文件
          for f in redis-server redis-cli redis-benchmark; do
            if [ -f "${f}.exe" ]; then
              cp "${f}.exe" "$BUILDS_DIR/"
              echo "已复制: ${f}.exe"
            fi
          done

          # 复制 MSYS2 运行时 DLL，确保可独立分发
          for dll in msys-2.0.dll msys-iconv-2.dll msys-intl-8.dll; do
            src="/usr/bin/$dll"
            [ -f "$src" ] && cp "$src" "$BUILDS_DIR/" && echo "已复制运行时: $dll"
          done

          ls -la "$BUILDS_DIR"

      # ==================== 打包 ====================
      - name: Package artifacts (Unix)
        if: matrix.os != 'windows'
        run: |
          VERSION="${{ matrix.version }}"
          TARGET="${{ matrix.target }}"
          
          mkdir -p "redis-${VERSION}-${TARGET}"
          cp "${{ github.workspace }}/builds/"* "redis-${VERSION}-${TARGET}/"
          
          # 添加 LICENSE 和 README
          if [ -f LICENSE ]; then cp LICENSE "redis-${VERSION}-${TARGET}/"; fi
          if [ -f README.md ]; then cp README.md "redis-${VERSION}-${TARGET}/"; fi
          
          # 创建 tar.gz 和 zip 两种格式
          tar czf "redis-${VERSION}-${TARGET}.tar.gz" "redis-${VERSION}-${TARGET}/"
          zip -r "redis-${VERSION}-${TARGET}.zip" "redis-${VERSION}-${TARGET}/"
          
          echo "ARTIFACT_TAR=redis-${VERSION}-${TARGET}.tar.gz" >> $GITHUB_ENV
          echo "ARTIFACT_ZIP=redis-${VERSION}-${TARGET}.zip" >> $GITHUB_ENV

      - name: Package artifacts (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $version = "${{ matrix.version }}"
          $target = "${{ matrix.target }}"
          
          New-Item -ItemType Directory -Path "redis-$version-$target" -Force
          Copy-Item "${{ github.workspace }}/builds/*" "redis-$version-$target/" -Recurse -ErrorAction SilentlyContinue
          
          # 添加 LICENSE 和 README
          if (Test-Path LICENSE) { Copy-Item LICENSE "redis-$version-$target/" }
          if (Test-Path README.md) { Copy-Item README.md "redis-$version-$target/" }
          
          # 创建 zip 格式
          Compress-Archive -Path "redis-$version-$target" -DestinationPath "redis-$version-$target.zip"
          
          "ARTIFACT_ZIP=redis-$version-$target.zip" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ==================== 上传构件 ====================
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: redis-${{ matrix.version }}-${{ matrix.target }}
          path: |
            redis-*.tar.gz
            redis-*.zip
          retention-days: 5

  release:
    name: Create Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          body: |
            ## Redis ${{ github.ref_name }} 预编译二进制文件
            
            本 Release 包含以下平台的预编译 Redis 二进制文件：
            
            - **Linux** (x86_64, arm64)
            - **macOS** (x86_64, arm64)
            - **Windows** (x86_64)
            
            ### 包含的工具
            
            - `redis-server` - Redis 服务器
            - `redis-cli` - Redis 命令行客户端
            - `redis-benchmark` - Redis 性能测试工具
            
            ### 下载说明
            
            请根据你的操作系统和架构选择对应的压缩包：
            
            - Linux/macOS: 下载 `.tar.gz` 或 `.zip` 文件
            - Windows: 下载 `.zip` 文件
            
            解压后即可直接使用，无需编译。
            
            ### 源码
            
            本构建基于 Redis 官方源码: https://github.com/redis/redis/tree/${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-batch:
    name: Create Batch Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        id: prepare-assets
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release/ \;
          ls -lh release/
          
          # 生成版本列表
          VERSIONS='${{ needs.prepare.outputs.versions }}'
          echo "versions=${VERSIONS}" >> $GITHUB_OUTPUT

      - name: Generate release body
        id: release-body
        run: |
          VERSIONS='${{ steps.prepare-assets.outputs.versions }}'
          DATE=$(date +%Y%m%d)
          
          # 生成 release 描述
          cat > release-body.md << 'EOF'
          ## Redis 多版本预编译二进制文件包
          
          构建日期: $(date +%Y-%m-%d)
          
          本 Release 包含以下 Redis 版本的预编译二进制文件：
          EOF
          
          # 添加版本列表
          echo "$VERSIONS" | jq -r '.[]' | while read version; do
            echo "- **Redis ${version}**" >> release-body.md
          done
          
          cat >> release-body.md << 'EOF'
          
          ### 支持的平台
          
          - **Linux** (x86_64, arm64)
          - **macOS** (x86_64 Intel, arm64 Apple Silicon)
          - **Windows** (x86_64)
          
          ### 包含的工具
          
          - `redis-server` - Redis 服务器
          - `redis-cli` - Redis 命令行客户端
          - `redis-benchmark` - Redis 性能测试工具
          
          ### 下载说明
          
          文件命名格式: `redis-{版本号}-{平台}-{架构}.{扩展名}`
          
          示例:
          - `redis-8.6.2-linux-x86_64.tar.gz` - Linux x86_64 版本
          - `redis-7.4.8-macos-arm64.tar.gz` - macOS Apple Silicon 版本
          - `redis-6.2.20-windows-x86_64.zip` - Windows 版本
          
          请根据你的操作系统和架构选择对应的压缩包：
          
          - **Linux/macOS**: 推荐下载 `.tar.gz` 文件
          - **Windows**: 下载 `.zip` 文件
          
          解压后即可直接使用，无需编译。
          
          ### 源码
          
          所有构建均基于 Redis 官方源码: https://github.com/redis/redis
          EOF
          
          echo "RELEASE_TAG=redis-batch-${DATE}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-body.outputs.RELEASE_TAG }}
          name: Redis 多版本构建 - ${{ steps.release-body.outputs.RELEASE_TAG }}
          files: release/*
          draft: false
          prerelease: false
          body_path: release-body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
